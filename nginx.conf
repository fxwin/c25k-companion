# Nginx configuration snippet for C25K Companion
# Add this inside your server block for fxwin.net

location /c25k {
    alias /home/c25k;
    index index.html;
    try_files $uri $uri/ /c25k/index.html;

    # Cache static assets
    location ~* \.(css|js)$ {
        alias /home/c25k;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
}
